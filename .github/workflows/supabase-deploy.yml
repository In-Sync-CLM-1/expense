name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Push migrations and deploy edge functions
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Mark legacy migrations as applied
        run: |
          for ts in $(ls supabase/migrations | sed 's/_.*//' | sort -u | awk '$1 <= "20260428000001"'); do
            supabase migration repair --linked --status applied "$ts" || true
          done

      - name: Push database migrations
        run: supabase db push --linked

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"

      - name: Set function secrets
        run: |
          supabase secrets set \
            SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            FROM_EMAIL=${{ secrets.FROM_EMAIL }} \
            --project-ref "$SUPABASE_PROJECT_ID"
